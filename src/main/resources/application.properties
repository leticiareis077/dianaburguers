# CONFIGURAÇÃO GERAL DO SISTEMA
# spring.application.name=DianaBurgers
server.port=${PORT:8080}
server.servlet.context-path=/DianaBurgers

# Perfil ativo: "h2" (padrão, dev local em memória) ou "postgres" (produção)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Limite de tamanho de requisição (fotos de produto em base64 no corpo JSON)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# LOGS E EXIBIÇÃO DE SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MENSAGENS DE ERRO (AMBIENTE DE DESENVOLVIMENTO)
# Para ativar em dev, desinale as linhas abaixo:
# server.error.include-message=always
# server.error.include-stacktrace=always

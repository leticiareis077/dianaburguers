# CONFIGURAï¿½ï¿½O GERAL DO SISTEMA
# spring.application.name=DianaBurgers
server.port=${PORT:8080}
server.servlet.context-path=/DianaBurgers

# CONFIGURAĂ‡ĂƒO DO BANCO DE DADOS (H2 EM MEMĂ“RIA)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# CONFIGURAï¿½ï¿½O DO JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# Limite de tamanho de requisiĂ§Ă£o (fotos de produto em base64 no corpo JSON)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# LOGS E EXIBIï¿½ï¿½O DE SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONSOLE DO H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# MENSAGENS DE ERRO (AMBIENTE DE DESENVOLVIMENTO)
# Para ativar em dev, desinale as linhas abaixo:
